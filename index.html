<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ba Na Hills Lookout</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#1a202c">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #f5f7fa;
            --container-bg: #ffffff;
            --text-color: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --glow-color: rgba(66, 153, 225, 0.4);
        }

        .dark-theme {
            --bg-color: #1a202c;
            --container-bg: #2d3748;
            --text-color: #f7fafc;
            --text-muted: #a0aec0;
            --border-color: #4a5568;
            --glow-color: rgba(66, 153, 225, 0.6);
        }

        .status-glow-green { --glow-color: rgba(72, 187, 120, 0.7); }
        .status-glow-yellow { --glow-color: rgba(236, 201, 75, 0.7); }
        .status-glow-rain { --glow-color: rgba(66, 153, 225, 0.7); }
        .status-glow-red { --glow-color: rgba(245, 101, 101, 0.8); }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
            padding: 8px;
            border-radius: 50%;
        }

        .theme-toggle:active {
            transform: scale(0.9);
            opacity: 1;
        }

        .card {
            background-color: var(--container-bg);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .image-container {
            width: 160px;
            height: 160px;
            margin-bottom: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            z-index: 2;
        }

        .image-glow {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--glow-color);
            filter: blur(25px);
            opacity: 0.8;
            z-index: 1;
            transition: background 0.5s ease, filter 0.5s ease;
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.95); opacity: 0.7; }
            100% { transform: scale(1.05); opacity: 0.9; filter: blur(30px); }
        }

        .status-badge {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding: 6px 16px;
            border-radius: 100px;
        }

        .badge-green { background: rgba(72, 187, 120, 0.15); color: #48bb78; }
        .badge-yellow { background: rgba(236, 201, 75, 0.15); color: #ecc94b; }
        .badge-rain { background: rgba(66, 153, 225, 0.15); color: #4299e1; }
        .badge-red { background: rgba(245, 101, 101, 0.15); color: #f56565; }

        /* СТИЛИ ДЛЯ СПИННЕРА ЗАГРУЗКИ */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 16px;
            gap: 8px;
        }

        .spinner-icon {
            width: 24px;
            height: 24px;
            color: #3b82f6;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .recommendation {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .metrics-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 12px;
            justify-content: center;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .metric-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .metric-icon {
            font-size: 20px;
            margin-bottom: 6px;
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .metric-value {
            font-size: 16px;
            font-weight: bold;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
        }

        #loading, #error {
            max-width: 400px;
            text-align: center;
            margin-top: 40px;
            font-weight: 500;
        }
        #error { color: #f56565; }

        /* --- ПОГОДНЫЕ ОВЕРЛЕИ --- */
        #weather-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .effect-rain {
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><line x1="50" y1="0" x2="30" y2="100" stroke="rgba(66,153,225,0.25)" stroke-width="1.2" stroke-linecap="round"/></svg>');
            background-size: 30px 80px;
            animation: rainFall 0.4s linear infinite;
        }
        @keyframes rainFall {
            0% { background-position: 0px -80px; }
            100% { background-position: -30px 0px; }
        }

        .effect-fog {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            animation: fogPulse 5s infinite alternate ease-in-out;
        }
        .dark-theme .effect-fog {
            background: rgba(26, 32, 44, 0.35);
        }
        @keyframes fogPulse {
            0% { opacity: 0.3; backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px); }
            100% { opacity: 1; backdrop-filter: blur(3.5px); -webkit-backdrop-filter: blur(3.5px); }
        }

        .effect-wind {
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><line x1="0" y1="50" x2="40" y2="50" stroke="rgba(160,174,192,0.15)" stroke-width="1.5" stroke-linecap="round"/></svg>');
            background-size: 160px 50px;
            animation: windBlow 0.4s linear infinite;
            opacity: 0.7;
        }
        @keyframes windBlow {
            0% { background-position: -160px 0px; }
            100% { background-position: 100vw 0px; }
        }
    </style>
</head>
<body>

    <div id="weather-overlay"></div>

    <div class="header">
        <h1>Ba Na Hills Lookout</h1>
        <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>

    <div id="error" style="display: none;">Ошибка / Error</div>

    <div id="app-content" class="card">
        <div class="image-container" id="img-container">
            <div class="image-glow" id="glow-layer"></div>
            <img id="weather-icon" src="clear.png" alt="Weather Status" class="weather-img">
        </div>

        <div id="status-badge" class="status-badge">--</div>

        <div id="bana-progress" class="loading-container">
            <svg class="spinner-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span id="label-loading-data" class="loading-text">Загружаем актуальную сводку...</span>
        </div>

        <div id="recommendation" class="recommendation">--</div>

        <div class="metrics-grid">
            <div class="metric-item">
                <div class="metric-icon">👁</div>
                <div class="metric-value" id="vis-val">--</div>
                <div class="metric-label" id="label-vis">Видимость</div>
            </div>
            <div class="metric-item">
                <div class="metric-icon">💨</div>
                <div class="metric-value" id="wind-val">--</div>
                <div class="metric-label" id="label-wind">Ветер</div>
            </div>
            <div class="metric-item">
                <div class="metric-icon">🌡</div>
                <div class="metric-value" id="temp-val">--</div>
                <div class="metric-label" id="label-temp">На горе</div>
            </div>
        </div>

        <div class="footer-text">
            <span id="label-update">Обновлено:</span> <span id="update-time">--:--</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // --- БЛОК ЛОКАЛИЗАЦИИ (СЛОВАРЬ) ---
        const translations = {
            ru: {
                error: "Ошибка загрузки данных. Попробуйте позже.",
                visLabel: "Видимость",
                windLabel: "Ветер",
                tempLabel: "На горе",
                updateLabel: "Обновлено:",
                updatingBar: "Загружаем актуальную сводку...",
                statuses: {
                    'GREEN': { badge: 'ОТЛИЧНО', text: 'Отличное время для поездки! Небо чистое, бери камеру.' },
                    'YELLOW': { badge: 'ВНИМАНИЕ', text: 'Плотная облачность. Вершина может быть в дымке, виды частично ограничены.' },
                    'RAIN': { badge: 'ДОЖДЬ', text: 'Идет дождь. На вершине сыро и некомфортно, виды скрыты за тучами.' },
                    'RED_FOG': { badge: 'ТУМАН', text: 'На вершине плотный туман ("молоко"). Золотой мост скрыт из видимости.' },
                    'RED_WIND': { badge: 'ВЕТЕР', text: 'Сильный ветер! Есть риск остановки канатной дороги.' }
                }
            },
            en: {
                error: "Error loading data. Please try again later.",
                visLabel: "Visibility",
                windLabel: "Wind",
                tempLabel: "Mountain",
                updateLabel: "Updated at:",
                updatingBar: "Loading current summary...",
                statuses: {
                    'GREEN': { badge: 'CLEAR', text: 'Perfect time to visit! The sky is clear, grab your camera.' },
                    'YELLOW': { badge: 'WARNING', text: 'Cloudy. The peak might be hazy, views are partially limited.' },
                    'RAIN': { badge: 'RAIN', text: 'It is raining. The peak is wet and views are hidden by clouds.' },
                    'RED_FOG': { badge: 'FOG', text: 'Thick fog at the top. The Golden Bridge is completely hidden.' },
                    'RED_WIND': { badge: 'WIND', text: 'Strong wind! The cable car might be suspended.' }
                }
            }
        };

        const tgLang = tg?.initDataUnsafe?.user?.language_code;
        const browserLang = window.navigator.language || window.navigator.userLanguage;
        const userLangCode = tgLang || browserLang || 'en';

        const lang = userLangCode.toLowerCase().startsWith('ru') ? 'ru' : 'en';
        const t = translations[lang];

        // Применяем статические переводы при загрузке
        document.getElementById('error').innerText = t.error;
        document.getElementById('label-vis').innerText = t.visLabel;
        document.getElementById('label-wind').innerText = t.windLabel;
        document.getElementById('label-temp').innerText = t.tempLabel;
        document.getElementById('label-update').innerText = t.updateLabel;
        document.getElementById('label-loading-data').innerText = t.updatingBar;

        const BACKEND_URL = 'https://bana-backend.onrender.com/api/bana-status';

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeBtn = document.getElementById('theme-btn');
            
            if (savedTheme === 'dark' || (!savedTheme && tg?.colorScheme === 'dark')) {
                document.body.classList.add('dark-theme');
                themeBtn.innerText = '☀️';
            } else {
                document.body.classList.remove('dark-theme');
                themeBtn.innerText = '🌙';
            }
        }

        function toggleTheme() {
            const btn = document.getElementById('theme-btn');
            if (document.body.classList.contains('dark-theme')) {
                document.body.classList.remove('dark-theme');
                btn.innerText = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark-theme');
                btn.innerText = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        async function fetchBanaStatus() {
            const progressContainer = document.getElementById('bana-progress');
            const contentBlock = document.getElementById('app-content');
            const imgContainer = document.getElementById('img-container');
            const iconImg = document.getElementById('weather-icon');
            const badge = document.getElementById('status-badge');
            const overlay = document.getElementById('weather-overlay');

            if (progressContainer) progressContainer.style.display = 'flex';
            imgContainer.className = 'image-container';

            try {
                const response = await fetch(BACKEND_URL);
                if (!response.ok) throw new Error('Ошибка сервера');
                
                const result = await response.json();
                const data = result.data;

                const currentStatusStrings = t.statuses[data.status] || t.statuses['YELLOW'];

                // Очищаем предыдущие эффекты анимации перед установкой новых
                if (overlay) {
                    overlay.className = '';
                    overlay.style.display = 'none';
                }

                if (data.status === 'GREEN') {
                    iconImg.src = 'clear.png';
                    badge.className = 'status-badge badge-green';
                    imgContainer.classList.add('status-glow-green');
                } else if (data.status === 'YELLOW') {
                    iconImg.src = 'cloudy.png';
                    badge.className = 'status-badge badge-yellow';
                    imgContainer.classList.add('status-glow-yellow');
                } else if (data.status === 'RAIN') {
                    iconImg.src = 'rain.png';
                    badge.className = 'status-badge badge-rain';
                    imgContainer.classList.add('status-glow-rain');
                    if (overlay) {
                        overlay.classList.add('effect-rain');
                        overlay.style.display = 'block';
                    }
                } else if (data.status === 'RED_FOG') {
                    iconImg.src = 'fog.png';
                    badge.className = 'status-badge badge-red';
                    imgContainer.classList.add('status-glow-red');
                    if (overlay) {
                        overlay.classList.add('effect-fog');
                        overlay.style.display = 'block';
                    }
                } else if (data.status === 'RED_WIND') {
                    iconImg.src = 'wind.png';
                    badge.className = 'status-badge badge-red';
                    imgContainer.classList.add('status-glow-red');
                    if (overlay) {
                        overlay.classList.add('effect-wind');
                        overlay.style.display = 'block';
                    }
                }

                badge.innerText = currentStatusStrings.badge;
                document.getElementById('recommendation').innerText = currentStatusStrings.text;
                document.getElementById('temp-val').innerText = `${data.temp}°C`;
                
                const windUnit = lang === 'ru' ? 'м/с' : 'm/s';
                document.getElementById('wind-val').innerText = `${Math.round(data.wind)} ${windUnit}`;
                
                // --- УМНАЯ КОРРЕКЦИЯ ДЕФОЛТНОЙ ВИДИМОСТИ ОТ API ---
                let currentVis = data.visibility || 10000;

                if (data.status === 'RED_FOG' && currentVis > 500) {
                    currentVis = 150; // Туман: 150 метров
                } else if (data.status === 'RAIN' && currentVis > 3000) {
                    currentVis = 2400; // Дождь: 2.4 км
                } else if (data.status === 'YELLOW' && currentVis > 7000) {
                    currentVis = 6500; // Облака: 6.5 км
                }

                const visKmUnit = lang === 'ru' ? 'км' : 'km';
                const visMUnit = lang === 'ru' ? 'м' : 'm';
                const visKm = currentVis >= 1000 
                    ? `${(currentVis / 1000).toFixed(1)} ${visKmUnit}` 
                    : `${currentVis} ${visMUnit}`;
                
                document.getElementById('vis-val').innerText = visKm;
                // --- КОНЕЦ КОРРЕКЦИИ ---

                const date = new Date(data.updatedAt);
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                document.getElementById('update-time').innerText = `${hours}:${minutes}`;

                if (progressContainer) progressContainer.style.display = 'none';

            } catch (err) {
                console.error(err);
                if (progressContainer) progressContainer.style.display = 'none';
                contentBlock.style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        initTheme();
        fetchBanaStatus();

        // --- РЕГИСТРАЦИЯ SERVICE WORKER ДЛЯ ПОДДЕРЖКИ УСТАНОВКИ PWA ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').then(function(registration) {
                    console.log('ServiceWorker успешно зарегистрирован!');
                }).catch(function(err) {
                    console.error('Ошибка регистрации ServiceWorker: ', err);
                });
            });
        }
    </script>
</body>
</html>
