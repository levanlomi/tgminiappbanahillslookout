<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ba Na Hills Lookout</title>
    <!-- Подключаем официальный скрипт Telegram Mini Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Базовые переменные (автоматически берутся из ТГ) */
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #707579);
            --card-bg: rgba(0, 0, 0, 0.03); 
        }

        /* Принудительная ТЕМНАЯ тема */
        body.theme-dark {
            --bg-color: #17212b;
            --text-color: #f5f5f5;
            --hint-color: #708499;
            --card-bg: rgba(255, 255, 255, 0.08);
        }

        /* Принудительная СВЕТЛАЯ тема */
        body.theme-light {
            --bg-color: #ffffff;
            --text-color: #000000;
            --hint-color: #707579;
            --card-bg: rgba(0, 0, 0, 0.03);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
        }

        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-titles h1 {
            font-size: 22px;
            margin: 0 0 4px 0;
        }

        .updated-at {
            font-size: 12px;
            color: var(--hint-color);
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .status-card {
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        .status-image {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .status-text {
            font-size: 18px;
            font-weight: bold;
            line-height: 1.4;
            color: #000000; 
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
        }

        .metric-item {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            transition: background-color 0.3s;
        }

        .metric-icon { font-size: 20px; margin-bottom: 4px; }
        .metric-value { font-size: 16px; font-weight: bold; }
        .metric-label { font-size: 11px; color: var(--hint-color); margin-top: 2px; }

        /* Цветовые темы для статусов (баннер) */
        .bg-green { background-color: #E8F5E9; }
        .bg-yellow { background-color: #FFFDE7; }
        .bg-red { background-color: #FFEBEE; }
        .bg-blue { background-color: #E3F2FD; } /* НОВЫЙ ЦВЕТ ДЛЯ ДОЖДЯ */
        
        .loader { font-size: 16px; color: var(--hint-color); margin-top: 50px; }
    </style>
</head>
<body>

    <div id="loader" class="loader">Получаем данные о погоде на вершине...</div>

    <div id="app-content" style="display: none; width: 100%; max-width: 400px;">
        
        <div class="header">
            <div class="header-titles">
                <h1>Ba Na Hills</h1>
                <div class="updated-at" id="updated-time">Обновлено: только что</div>
            </div>
            <button id="theme-toggle" class="theme-toggle-btn">🌓</button>
        </div>

        <div class="status-card" id="status-card">
            <img src="" alt="Weather Status" class="status-image" id="status-img">
            <div class="status-text" id="recommendation-text">...</div>
        </div>

        <div class="metrics-grid">
            <div class="metric-item">
                <div class="metric-icon">👁</div>
                <div class="metric-value" id="val-vis">--</div>
                <div class="metric-label">Видимость</div>
            </div>
            <div class="metric-item">
                <div class="metric-icon">💨</div>
                <div class="metric-value" id="val-wind">--</div>
                <div class="metric-label">Ветер</div>
            </div>
            <div class="metric-item">
                <div class="metric-icon">🌡</div>
                <div class="metric-value" id="val-temp">--</div>
                <div class="metric-label">На горе</div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); 

        // Замени на свой URL после деплоя
        const BACKEND_URL = 'https://твой-бэкенд.onrender.com/api/bana-status';

        // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ТЕМЫ ---
        const themeBtn = document.getElementById('theme-toggle');
        let isDark = tg.colorScheme === 'dark';

        function applyTheme() {
            if (isDark) {
                document.body.classList.add('theme-dark');
                document.body.classList.remove('theme-light');
                themeBtn.innerText = '☀️';
            } else {
                document.body.classList.add('theme-light');
                document.body.classList.remove('theme-dark');
                themeBtn.innerText = '🌙';
            }
        }

        applyTheme();

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            applyTheme();
        });
        // --------------------------------

        async function fetchBanaStatus() {
            try {
                const response = await fetch(BACKEND_URL);
                const result = await response.json();
                const data = result.data;

                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';

                document.getElementById('val-temp').innerText = `${data.temp}°C`;
                document.getElementById('val-wind').innerText = `${Math.round(data.wind)} м/с`;
                
                const visKm = data.visibility >= 1000 ? `${(data.visibility / 1000).toFixed(1)} км` : `${data.visibility} м`;
                document.getElementById('val-vis').innerText = visKm;

                const card = document.getElementById('status-card');
                const img = document.getElementById('status-img');
                const text = document.getElementById('recommendation-text');

                text.innerText = data.recommendation;

                // --- НОВАЯ ЛОГИКА С ДОЖДЕМ ---
                if (data.status === 'GREEN') {
                    card.className = 'status-card bg-green';
                    img.src = 'clear.png';
                } else if (data.status === 'YELLOW') {
                    card.className = 'status-card bg-yellow';
                    img.src = 'cloudy.png';
                } else if (data.status === 'RAIN') {
                    card.className = 'status-card bg-blue';
                    img.src = 'rain.png';
                } else if (data.status === 'RED_WIND') {
                    card.className = 'status-card bg-red';
                    img.src = 'wind.png';
                } else { 
                    card.className = 'status-card bg-red';
                    img.src = 'fog.png';
                }

                const date = new Date(data.updatedAt);
                document.getElementById('updated-time').innerText = `Обновлено в ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

                tg.MainButton.setText("Закрыть").show().onClick(() => {
                    tg.close();
                });

            } catch (error) {
                document.getElementById('loader').innerText = 'Ошибка загрузки данных. Попробуйте позже.';
                console.error(error);
            }
        }

        fetchBanaStatus();
    </script>
</body>
</html>
